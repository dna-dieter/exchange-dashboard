<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Artifakte — SEC Filing Cabinet</title>
<style>
:root {
  --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #16213e;
  --text: #e8e8f0; --dim: #636e72; --accent: #e94560;
  --green: #00b894; --green2: #00cec9; --yellow: #ffeaa7;
  --orange: #fdcb6e; --red: #d63031; --blue: #74b9ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  background: var(--bg); color: var(--text);
  max-width: 1200px; margin: 0 auto; padding: 10px 16px;
  font-size: 12px;
}
h1 { color: var(--accent); font-size: 16px; margin-bottom: 1px; }
.subtitle { color: var(--dim); font-size: 9px; margin-bottom: 8px; }

/* ===== TRICHTER ===== */
.funnel {
  background: var(--surface); border: 1px solid #2d3436;
  border-radius: 6px; padding: 8px 12px; margin-bottom: 8px;
}
.funnel-title { color: var(--accent); font-size: 11px; font-weight: bold; margin-bottom: 4px; }
.funnel-steps {
  display: flex; align-items: center; gap: 0; flex-wrap: wrap;
  justify-content: center;
}
.funnel-step {
  text-align: center; padding: 3px 8px; position: relative;
  min-width: 80px;
}
.funnel-step .fn { font-size: 15px; font-weight: bold; color: var(--green2); }
.funnel-step .fl { font-size: 8px; color: var(--dim); margin-top: 1px; }
.funnel-arrow { color: var(--dim); font-size: 14px; padding: 0 1px; }
.funnel-removed { color: var(--red); font-size: 8px; }
